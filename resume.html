<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wang</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(120deg, #fdfbfb, #ebedee);
      color: #333;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 2px;
    }

    header p {
      color: #777;
      margin-top: 10px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
    }

    .left, .right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .profile {
      text-align: center;
    }

    .profile img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #667eea;
      transition: 0.4s;
    }

    .profile img:hover {
      transform: scale(1.08);
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    .skills span {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      margin: 5px 5px 0 0;
      font-size: 13px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .btn:hover {
      background: #4f5bd5;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #999;
    }

    /* 手機版 */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>王逸璇</h1>
  <p>亞洲大學 | 學號 1114024065</p>
</header>

<div class="container">

  <div class="left">

    <div class="card profile">
      <img src="images/IMG_9851.jpg" alt="個人照片">
      <h3>王逸璇</h3>
    </div>

    <div class="card">
      <h2>基本資料</h2>
      <p>Email：ihsuan1202@email.com</p>
      <p>學校：亞洲大學</p>
    </div>

    <div class="card">
      <h2>技能</h2>
      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>設計</span>
      </div>
    </div>

  </div>

  <div class="right">

    <div class="card">
      <h2>自我介紹</h2>
      <p id="intro">我是一名積極學習的學生，對網頁設計與創意開發有濃厚興趣。</p>
      <button class="btn" onclick="changeIntro()">換一句</button>
    </div>

    <div class="card">
      <h2>經歷</h2>
      <ul>
        <li>校內專題製作</li>
        <li>網頁設計課程作品</li>
        <li>團隊合作專案</li>
      </ul>
    </div>

  </div>

</div>

<footer>
  © 2026 Resume
</footer>

<script>
  function changeIntro() {
    const texts = [
      "我喜歡學習新技術並挑戰自己。",
      "我對設計與程式充滿熱情。",
      "我擅長團隊合作與問題解決。",
      "我持續提升自我，追求更好的作品品質。"
    ];

    const random = Math.floor(Math.random() * texts.length);
    document.getElementById("intro").innerText = texts[random];
  }
</script>

</body>
</html>
